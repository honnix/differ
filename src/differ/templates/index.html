<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Differ — {{ repo_slug }}</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<h1><a href="/" style="color:inherit;text-decoration:none;">Differ</a> / {{ repo_slug }}</h1>

<div class="toolbar">
  <button class="btn-tree-toggle" id="btn-tree-toggle" onclick="toggleFileTree()" title="Toggle file tree">Files</button>
  <div class="view-toggle">
    <button id="btn-unified" onclick="setView('unified')">Unified</button>
    <button id="btn-split" class="active" onclick="setView('split')">Split</button>
  </div>
  <div class="file-search-panel" id="file-search-panel">
    <span class="file-search-icon">&#x1F50D;</span>
    <input type="text" class="file-search-input" id="file-search-input"
           placeholder="Search files..." autocomplete="off">
    <div class="file-search-dropdown" id="file-search-dropdown"></div>
  </div>
  <span class="file-count" id="file-count"></span>
  <button class="btn-reload" onclick="clearAllComments()" title="Clear all comments">Clear comments</button>
  <div class="viewed-progress" id="viewed-progress" style="display:none">
    <div class="viewed-progress-bar"><div class="viewed-progress-fill" id="viewed-progress-fill"></div></div>
    <span id="viewed-count-text"></span>
  </div>
</div>

<div class="main-layout">
  <div class="file-tree-sidebar" id="file-tree-sidebar">
    <div class="file-tree-header">Files <span id="tree-file-count"></span></div>
    <input type="text" class="file-tree-filter" id="file-tree-filter" placeholder="Filter files..." autocomplete="off">
    <div id="file-tree-content"></div>
  </div>
  <div class="diff-content" id="app" data-repo-slug="{{ repo_slug }}"><div class="loading">Loading diff...</div></div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
